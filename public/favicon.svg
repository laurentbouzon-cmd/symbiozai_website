<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faceLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="faceRight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </linearGradient>
    <linearGradient id="faceTop" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>

  <!-- Fond blanc -->
  <rect width="64" height="64" fill="#FFFFFF"/>

  <!-- Cube 3D isometrique - optimise pour petites tailles -->
  <!-- Face gauche -->
  <path d="M32 16 L14 26 L14 46 L32 56 Z" fill="url(#faceLeft)" stroke="#0088C2" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Face droite -->
  <path d="M32 16 L50 26 L50 46 L32 56 Z" fill="url(#faceRight)" stroke="#0088C2" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Face du dessus -->
  <path d="M32 16 L14 26 L32 36 L50 26 Z" fill="url(#faceTop)" stroke="#0088C2" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Point central bleu lumineux -->
  <circle cx="32" cy="36" r="4.5" fill="#0088C2"/>
  <circle cx="32" cy="36" r="2.5" fill="#00A8E8"/>
</svg>
